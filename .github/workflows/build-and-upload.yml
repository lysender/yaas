name: Build and Upload Binary

on:
  push:
    branches:
      - main

concurrency:
  group: build-upload-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    env:
      S3_UPLOAD_BUCKET: ${{ vars.S3_UPLOAD_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: useblacksmith/rust-cache@v3

      - name: Setup Node.js 24
        uses: useblacksmith/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend assets
        run: npm run build:assets
        working-directory: frontend

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build release binaries
        run: cargo build --release

      - name: Create frontend public asset archive
        run: zip -r public.zip public
        working-directory: frontend

      - name: Verify frontend public asset archive
        run: ls -lh frontend/public.zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload binary to S3
        run: |
          test -n "$S3_UPLOAD_BUCKET" || { echo "S3_UPLOAD_BUCKET is not set"; exit 1; }
          aws s3 cp target/release/yaas s3://$S3_UPLOAD_BUCKET/yaas/bin/yaas

      - name: Upload frontend public assets zip to S3
        run: aws s3 cp frontend/public.zip s3://$S3_UPLOAD_BUCKET/yaas/html/public.zip
