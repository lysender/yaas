syntax = "proto3";

package buffed.dto;

message PasswordBuf {
    string id = 1;
    string password = 2;
    int64 created_at = 3;
    int64 updated_at = 4;
}

message ChangeCurrentPasswordBuf {
    string current_password = 1;
    string new_password = 2;
}

message NewPasswordBuf {
    string password = 1;
}
