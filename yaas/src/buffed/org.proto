syntax = "proto3";

package buffed.dto;

import "buffed/pagination.proto";

message OrgBuf {
    string id = 1;
    string name = 2;
    string status = 3;
    optional int32 owner_id = 4;
    optional string owner_email = 5;
    optional string owner_name = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
}

message PaginatedOrgsBuf {
    buffed.pagination.PaginatedMetaBuf meta = 1;
    repeated OrgBuf data = 2;
}

message OrgOwnerSuggestionBuf {
    string id = 1;
    string email = 2;
    string name = 3;
}

message PaginatedOrgOwnerSuggestionsBuf {
    buffed.pagination.PaginatedMetaBuf meta = 1;
    repeated OrgOwnerSuggestionBuf data = 2;
}

message NewOrgBuf {
    string name = 1;
    string owner_id = 2;
}

message UpdateOrgBuf {
    optional string name = 1;
    optional string status = 2;
    optional string owner_id = 3;
}
