syntax = "proto3";

package buffed.dto;

import "buffed/pagination.proto";

message OrgAppBuf {
    string id = 1;
    string org_id = 2;
    string app_id = 3;
    optional string app_name = 4;
    int64 created_at = 5;
}

message PaginatedOrgAppsBuf {
    buffed.pagination.PaginatedMetaBuf meta = 1;
    repeated OrgAppBuf data = 2;
}

message OrgAppSuggestionBuf {
    string id = 1;
    string name = 2;
}

message PaginatedOrgAppSuggestionsBuf {
    buffed.pagination.PaginatedMetaBuf meta = 1;
    repeated OrgAppSuggestionBuf data = 2;
}

message NewOrgAppBuf {
    string app_id = 1;
}
