syntax = "proto3";

package buffed.dto;

message OauthCodeBuf {
    string id = 1;
    string code = 2;
    string state = 3;
    string redirect_uri = 4;
    string scope = 5;
    string app_id = 6;
    string org_id = 7;
    string user_id = 8;
    int64 created_at = 9;
    int64 expires_at = 10;
}
